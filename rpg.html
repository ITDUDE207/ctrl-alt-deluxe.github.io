        }
        .item-name {

        }

        }

        }
        .divider {
            color: #00ff00;
            margin: 10px 0;
        }
        #reset-btn {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            margin-top: 10px;
        }
        #reset-btn:hover {
            background-color: #00cc00;
        }
    </style>

    <div class="game-container">
        <h1>🐍 Python RPG Adventure Game 🎮</h1>
        
        <div id="game-output"></div>
        
        <input type="text" id="game-input" placeholder="Enter command (e.g., 'go south' or 'get key')..." autocomplete="off">
        <button id="reset-btn" class="btn">Reset Game</button>
    </div>

    <script>
        class RPGGame {
            constructor() {
                this.inventory = [];
                this.currentRoom = 1;
                this.gameOver = false;
                this.rooms = {
                    1: {
                        name: 'Hall',
                        south: 2,
                        east: 3,
                        item: 'key'
                    },
                    2: {
                        name: 'Kitchen',
                        north: 1,
                        east: 4,
                        item: 'potion'
                    },
                    3: {
                        name: 'Dining Room',
                        west: 1,
                        south: 4
                    },
                    4: {
                        name: 'Garden',
                        north: 3,
                        west: 2
                    },
                    5: {
                        name: 'Cellar',
                        item: 'monster'
                    }
                };
            }

            start() {
                this.printLine('========================================');
                this.printLine('       RPG ADVENTURE GAME', 'success-text');
                this.printLine('========================================');
                this.printLine('');
                this.printLine('Commands:');
                this.printLine('  go [direction] - Move (north, south, east, west)');
                this.printLine('  get [item] - Pick up an item');
                this.printLine('');
                this.printLine('Goal: Collect the key and potion, then reach the Garden to escape!');
                this.printLine('');
                this.printLine('---------------------------', 'divider');
                this.showStatus();
            }

            showStatus() {
                const room = this.rooms[this.currentRoom];
                this.printLine('');
                this.printLine(`You are in the ${room.name}`, 'room-name');
                this.printLine(`Inventory: [${this.inventory.join(', ')}]`);
                
                if (room.item) {
                    if (room.item === 'monster') {
                        this.printLine('');
                        this.printLine('⚠️  A MONSTER APPEARS! ⚠️', 'error-text');
                        this.printLine('GAME OVER - You have been defeated!', 'error-text');
                        this.gameOver = true;
                        return;
                    } else {
                        this.printLine(`You see a ${room.item}`, 'item-name');
                    }
                }
                
                const exits = [];
                if (room.north) exits.push('north');
                if (room.south) exits.push('south');
                if (room.east) exits.push('east');
                if (room.west) exits.push('west');
                
                if (exits.length > 0) {
                    this.printLine(`Exits: ${exits.join(', ')}`);
                }
                
                this.printLine('---------------------------', 'divider');
                
                this.checkWin();
            }

            checkWin() {
                if (this.currentRoom === 4 && 
                    this.inventory.includes('key') && 
                    this.inventory.includes('potion')) {
                    this.printLine('');
                    this.printLine('🎉 CONGRATULATIONS! 🎉', 'success-text');
                    this.printLine('You escaped the house with the key and potion!', 'success-text');
                    this.printLine('YOU WIN!', 'success-text');
                    this.gameOver = true;
                }
            }

            processCommand(input) {
                if (this.gameOver) {
                    this.printLine('Game is over! Click "Reset Game" to play again.', 'error-text');
                    return;
                }

                const parts = input.toLowerCase().trim().split(' ');
                
                if (parts.length < 2) {
                    this.printLine('Invalid command! Use "go [direction]" or "get [item]"', 'error-text');
                    return;
                }

                const command = parts[0];
                const argument = parts[1];

                this.printLine(`> ${input}`, 'success-text');

                if (command === 'go') {
                    this.handleGo(argument);
                } else if (command === 'get') {
                    this.handleGet(argument);
                } else {
                    this.printLine('Unknown command! Use "go" or "get"', 'error-text');
                }
            }

            handleGo(direction) {
                const room = this.rooms[this.currentRoom];
                
                if (room[direction]) {
                    this.currentRoom = room[direction];
                    this.showStatus();
                } else {
                    this.printLine("You can't go that way!", 'error-text');
                }
            }

            handleGet(item) {
                const room = this.rooms[this.currentRoom];
                
                if (room.item && room.item === item) {
                    if (item === 'monster') {
                        this.printLine("You can't get a monster!", 'error-text');
                        return;
                    }
                    this.inventory.push(item);
                    this.printLine(`${item} picked up!`, 'success-text');
                    delete room.item;
                } else {
                    this.printLine(`Can't get ${item}!`, 'error-text');
                }
            }

            printLine(text, className = 'game-line') {
                const output = document.getElementById('game-output');
                const line = document.createElement('div');
                line.className = className;
                line.textContent = text;
                output.appendChild(line);
                output.scrollTop = output.scrollHeight;
            }

            reset() {
                document.getElementById('game-output').innerHTML = '';
                this.inventory = [];
                this.currentRoom = 1;
                this.gameOver = false;
                this.rooms[1].item = 'key';
                this.rooms[2].item = 'potion';
                delete this.rooms[3].item;
                this.start();
            }
        }

        const game = new RPGGame();
        game.start();

        const input = document.getElementById('game-input');
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const command = input.value;
                if (command.trim()) {
                    game.processCommand(command);
                    input.value = '';
                }
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            game.reset();
            input.value = '';
            input.focus();
        });

        input.focus();
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
