<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Car Driving</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #000 !important;
            border-bottom: 2px solid #00ff00;
            flex-shrink: 0;
        }
        .navbar-brand, .nav-link {
            color: #00ff00 !important;
        }
        #gameCanvas {
            display: block;
            flex: 1;
            width: 100%;
            cursor: crosshair;
        }
        .hud {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            border-top: 2px solid #00ff00;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 12px;
            z-index: 10;
            flex-wrap: wrap;
            gap: 4px;
        }
        .hud-item {
            text-align: center;
        }
        .hud-label {
            color: #00ffff;
            font-size: 0.7rem;
        }
        .hud-value {
            color: #00ff00;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .hud-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 4px 14px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .hud-btn:hover { background: #00ffff; }
        .minimap {
            position: fixed;
            top: 65px;
            right: 10px;
            border: 2px solid #00ff00;
            background: rgba(0,0,0,0.8);
            z-index: 10;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🎮 Gaming Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="wormhole.html">Wormhole</a></li>
                    <li class="nav-item"><a class="nav-link" href="rpg.html">Python RPG</a></li>
                    <li class="nav-item"><a class="nav-link active" href="car-game.html">Car Driving</a></li>
                    <li class="nav-item"><a class="nav-link" href="micro-farm.html">Micro Farm</a></li>
                    <li class="nav-item"><a class="nav-link" href="flight-sim.html">Flight Sim</a></li>
                    <li class="nav-item"><a class="nav-link" href="fox-sim.html">Fox Sim</a></li>
                    <li class="nav-item"><a class="nav-link" href="plane-game.html">Sky Dogfight</a></li>
                    <li class="nav-item"><a class="nav-link" href="tower-defense.html">Tower Defense</a></li>
                    <li class="nav-item"><a class="nav-link" href="info.html">Info</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap" class="minimap" width="140" height="140"></canvas>

    <div class="hud">
        <div class="hud-item"><div class="hud-label">SPEED</div><div class="hud-value" id="speedDisplay">0</div></div>
        <div class="hud-item"><div class="hud-label">DRIFT</div><div class="hud-value" id="angleDisplay">0°</div></div>
        <div class="hud-item"><div class="hud-label">DISTANCE</div><div class="hud-value" id="distanceDisplay">0m</div></div>
        <div class="hud-item"><div class="hud-label">POSITION</div><div class="hud-value" id="posDisplay">0, 0</div></div>
        <button class="hud-btn" id="resetBtn">RESET</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mmCanvas = document.getElementById('minimap');
        const mmCtx = mmCanvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function mulberry32(a) {
            return function() {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                let t = Math.imul(a ^ a >>> 15, 1 | a);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        function chunkSeed(cx, cy) {
            let h = cx * 374761393 + cy * 668265263 + 1013904223;
            h = (h ^ (h >> 13)) * 1274126177;
            h = h ^ (h >> 16);
            return h;
        }

        const CHUNK = 400;
        const ROAD_W = 60;
        const chunkCache = new Map();
        const MAX_CACHE = 100;

        function getChunkData(cx, cy) {
            const key = cx + ',' + cy;
            if (chunkCache.has(key)) return chunkCache.get(key);

            const rng = mulberry32(chunkSeed(cx, cy));

            const hasHRoad = rng() < 0.55;
            const hasVRoad = rng() < 0.55;
            const hRoadY = Math.floor(rng() * 3) === 0 ? CHUNK * 0.3 : (Math.floor(rng() * 2) === 0 ? CHUNK * 0.5 : CHUNK * 0.7);
            const vRoadX = Math.floor(rng() * 3) === 0 ? CHUNK * 0.3 : (Math.floor(rng() * 2) === 0 ? CHUNK * 0.5 : CHUNK * 0.7);

            const buildings = [];
            const trees = [];
            const cones = [];

            for (let i = 0; i < 6; i++) {
                const bx = rng() * (CHUNK - 80) + 20;
                const by = rng() * (CHUNK - 80) + 20;
                const bw = 30 + rng() * 50;
                const bh = 30 + rng() * 50;

                let onRoad = false;
                if (hasHRoad && by + bh > hRoadY - ROAD_W/2 && by < hRoadY + ROAD_W/2) onRoad = true;
                if (hasVRoad && bx + bw > vRoadX - ROAD_W/2 && bx < vRoadX + ROAD_W/2) onRoad = true;

                if (!onRoad) {
                    const bright = rng() > 0.5;
                    buildings.push({ x: bx, y: by, w: bw, h: bh, color: bright ? '#00ff00' : '#006600', windows: Math.floor(rng() * 4) + 1 });
                }
            }

            for (let i = 0; i < 10; i++) {
                const tx = rng() * CHUNK;
                const ty = rng() * CHUNK;
                let onRoad = false;
                if (hasHRoad && ty > hRoadY - ROAD_W/2 - 5 && ty < hRoadY + ROAD_W/2 + 5) onRoad = true;
                if (hasVRoad && tx > vRoadX - ROAD_W/2 - 5 && tx < vRoadX + ROAD_W/2 + 5) onRoad = true;
                if (!onRoad) {
                    trees.push({ x: tx, y: ty, r: 4 + rng() * 6 });
                }
            }

            if (hasHRoad || hasVRoad) {
                for (let i = 0; i < 3; i++) {
                    if (rng() < 0.4) {
                        let ccx, ccy;
                        if (hasHRoad && rng() < 0.5) {
                            ccx = rng() * CHUNK;
                            ccy = hRoadY + (rng() > 0.5 ? 1 : -1) * (ROAD_W/2 - 5 - rng() * 10);
                        } else if (hasVRoad) {
                            ccx = vRoadX + (rng() > 0.5 ? 1 : -1) * (ROAD_W/2 - 5 - rng() * 10);
                            ccy = rng() * CHUNK;
                        } else continue;
                        cones.push({ x: ccx, y: ccy });
                    }
                }
            }

            const data = { hasHRoad, hasVRoad, hRoadY, vRoadX, buildings, trees, cones };
            chunkCache.set(key, data);

            if (chunkCache.size > MAX_CACHE) {
                const iter = chunkCache.keys();
                for (let i = 0; i < 20; i++) chunkCache.delete(iter.next().value);
            }

            return data;
        }

        function drawChunk(cx, cy, camX, camY) {
            const wx = cx * CHUNK;
            const wy = cy * CHUNK;
            const sx = wx - camX;
            const sy = wy - camY;

            if (sx + CHUNK < 0 || sx > canvas.width || sy + CHUNK < 0 || sy > canvas.height) return;

            const d = getChunkData(cx, cy);

            ctx.fillStyle = '#0a2a0a';
            ctx.fillRect(sx, sy, CHUNK, CHUNK);

            ctx.strokeStyle = '#0f3f0f';
            ctx.lineWidth = 1;
            for (let g = 0; g <= CHUNK; g += 50) {
                ctx.beginPath(); ctx.moveTo(sx + g, sy); ctx.lineTo(sx + g, sy + CHUNK); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sx, sy + g); ctx.lineTo(sx + CHUNK, sy + g); ctx.stroke();
            }

            if (d.hasHRoad) {
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(sx, sy + d.hRoadY - ROAD_W/2, CHUNK, ROAD_W);
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.strokeRect(sx, sy + d.hRoadY - ROAD_W/2, CHUNK, ROAD_W);
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.setLineDash([12, 12]);
                ctx.beginPath();
                ctx.moveTo(sx, sy + d.hRoadY);
                ctx.lineTo(sx + CHUNK, sy + d.hRoadY);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            if (d.hasVRoad) {
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(sx + d.vRoadX - ROAD_W/2, sy, ROAD_W, CHUNK);
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.strokeRect(sx + d.vRoadX - ROAD_W/2, sy, ROAD_W, CHUNK);
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.setLineDash([12, 12]);
                ctx.beginPath();
                ctx.moveTo(sx + d.vRoadX, sy);
                ctx.lineTo(sx + d.vRoadX, sy + CHUNK);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            if (d.hasHRoad && d.hasVRoad) {
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(sx + d.vRoadX - ROAD_W/2, sy + d.hRoadY - ROAD_W/2, ROAD_W, ROAD_W);
            }

            d.buildings.forEach(b => {
                ctx.fillStyle = '#111';
                ctx.fillRect(sx + b.x, sy + b.y, b.w, b.h);
                ctx.strokeStyle = b.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(sx + b.x, sy + b.y, b.w, b.h);
                const winSize = 4;
                const winGap = 10;
                ctx.fillStyle = '#003300';
                for (let wi = 0; wi < b.windows; wi++) {
                    for (let wj = 0; wj < Math.floor(b.w / winGap) - 1; wj++) {
                        ctx.fillRect(sx + b.x + 6 + wj * winGap, sy + b.y + 6 + wi * winGap, winSize, winSize);
                    }
                }
            });

            d.trees.forEach(t => {
                ctx.fillStyle = '#0a4a0a';
                ctx.beginPath();
                ctx.arc(sx + t.x, sy + t.y, t.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#006600';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            d.cones.forEach(c => {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(sx + c.x, sy + c.y - 12);
                ctx.lineTo(sx + c.x - 8, sy + c.y + 12);
                ctx.lineTo(sx + c.x + 8, sy + c.y + 12);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }

        const tireTrail = [];
        const MAX_TRAIL = 300;

        let camX = 0, camY = 0;
        const CAM_LERP = 0.08;

        class Car {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 50;
                this.angle = 0;
                this.speed = 0;
                this.maxSpeed = 8;
                this.acceleration = 0.3;
                this.friction = 0.05;
                this.turnSpeed = 0.05;
                this.totalDistance = 0;
            }

            update(keys) {
                if (keys.ArrowUp || keys.w) {
                    this.speed += this.acceleration;
                }
                if (keys.ArrowDown || keys.s) {
                    this.speed -= this.acceleration;
                }
                if (keys[' ']) {
                    this.speed *= 0.9;
                }
                if (this.speed !== 0) {
                    if (keys.ArrowLeft || keys.a) {
                        this.angle -= this.turnSpeed * Math.abs(this.speed) / 2;
                    }
                    if (keys.ArrowRight || keys.d) {
                        this.angle += this.turnSpeed * Math.abs(this.speed) / 2;
                    }
                }
                if (this.speed > 0) {
                    this.speed -= this.friction;
                    if (this.speed < 0) this.speed = 0;
                } else if (this.speed < 0) {
                    this.speed += this.friction;
                    if (this.speed > 0) this.speed = 0;
                }
                if (this.speed > this.maxSpeed) this.speed = this.maxSpeed;
                if (this.speed < -this.maxSpeed / 2) this.speed = -this.maxSpeed / 2;

                const oldX = this.x;
                const oldY = this.y;
                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * this.speed;

                const dist = Math.sqrt((this.x - oldX) ** 2 + (this.y - oldY) ** 2);
                this.totalDistance += dist;

                if (Math.abs(this.speed) > 0.5) {
                    const cosA = Math.cos(this.angle);
                    const sinA = Math.sin(this.angle);
                    const hw = this.width / 2;
                    const hh = this.height / 2;
                    tireTrail.push(
                        { x: this.x - hw * cosA + hh * sinA * 0.6, y: this.y - hw * sinA - hh * cosA * 0.6, age: 0 },
                        { x: this.x + hw * cosA + hh * sinA * 0.6, y: this.y + hw * sinA - hh * cosA * 0.6, age: 0 }
                    );
                    while (tireTrail.length > MAX_TRAIL) tireTrail.shift();
                }
            }

            draw(camX, camY) {
                const sx = this.x - camX;
                const sy = this.y - camY;

                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(this.angle);

                ctx.fillStyle = '#00ff00';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);

                ctx.fillStyle = '#ffff00';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, 10);

                ctx.fillStyle = '#000';
                ctx.fillRect(-this.width / 2 - 3, -this.height / 2 + 10, 5, 15);
                ctx.fillRect(this.width / 2 - 2, -this.height / 2 + 10, 5, 15);
                ctx.fillRect(-this.width / 2 - 3, this.height / 2 - 25, 5, 15);
                ctx.fillRect(this.width / 2 - 2, this.height / 2 - 25, 5, 15);

                ctx.restore();
            }

            reset() {
                this.x = 0;
                this.y = 0;
                this.angle = 0;
                this.speed = 0;
                this.totalDistance = 0;
                tireTrail.length = 0;
            }
        }

        const car = new Car(0, 0);
        const keys = {};

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
            keys[e.key] = true;
        });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });
        document.getElementById('resetBtn').addEventListener('click', () => { car.reset(); });

        function drawTireTrail(camX, camY) {
            for (let i = 0; i < tireTrail.length; i++) {
                const t = tireTrail[i];
                t.age++;
                const alpha = Math.max(0, 1 - t.age / 180) * 0.25;
                if (alpha <= 0) continue;
                const sx = t.x - camX;
                const sy = t.y - camY;
                if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) continue;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#003300';
                ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
            }
            ctx.globalAlpha = 1;
        }

        function drawMinimap() {
            const mw = mmCanvas.width;
            const mh = mmCanvas.height;
            const scale = 0.04;
            const viewW = mw / scale;
            const viewH = mh / scale;
            const ox = car.x - viewW / 2;
            const oy = car.y - viewH / 2;

            mmCtx.fillStyle = '#0a0a0a';
            mmCtx.fillRect(0, 0, mw, mh);

            const startCX = Math.floor(ox / CHUNK);
            const startCY = Math.floor(oy / CHUNK);
            const endCX = Math.ceil((ox + viewW) / CHUNK);
            const endCY = Math.ceil((oy + viewH) / CHUNK);

            for (let cy = startCY; cy <= endCY; cy++) {
                for (let cx = startCX; cx <= endCX; cx++) {
                    const d = getChunkData(cx, cy);
                    const wx = cx * CHUNK;
                    const wy = cy * CHUNK;
                    const sx = (wx - ox) * scale;
                    const sy = (wy - oy) * scale;
                    const cs = CHUNK * scale;

                    if (d.hasHRoad) {
                        mmCtx.fillStyle = '#333';
                        mmCtx.fillRect(sx, sy + (d.hRoadY - ROAD_W/2) * scale, cs, ROAD_W * scale);
                    }
                    if (d.hasVRoad) {
                        mmCtx.fillStyle = '#333';
                        mmCtx.fillRect(sx + (d.vRoadX - ROAD_W/2) * scale, sy, ROAD_W * scale, cs);
                    }
                    d.buildings.forEach(b => {
                        mmCtx.fillStyle = '#004400';
                        mmCtx.fillRect(sx + b.x * scale, sy + b.y * scale, b.w * scale, b.h * scale);
                    });
                }
            }

            mmCtx.fillStyle = '#ff0000';
            mmCtx.fillRect(mw / 2 - 2, mh / 2 - 2, 4, 4);

            mmCtx.strokeStyle = '#00ff00';
            mmCtx.lineWidth = 1;
            mmCtx.strokeRect(0, 0, mw, mh);
        }

        function gameLoop() {
            car.update(keys);

            const targetCamX = car.x - canvas.width / 2;
            const targetCamY = car.y - canvas.height / 2;
            camX += (targetCamX - camX) * CAM_LERP;
            camY += (targetCamY - camY) * CAM_LERP;

            ctx.fillStyle = '#0a2a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startCX = Math.floor(camX / CHUNK) - 1;
            const startCY = Math.floor(camY / CHUNK) - 1;
            const endCX = Math.ceil((camX + canvas.width) / CHUNK) + 1;
            const endCY = Math.ceil((camY + canvas.height) / CHUNK) + 1;

            for (let cy = startCY; cy <= endCY; cy++) {
                for (let cx = startCX; cx <= endCX; cx++) {
                    drawChunk(cx, cy, camX, camY);
                }
            }

            drawTireTrail(camX, camY);
            car.draw(camX, camY);

            document.getElementById('speedDisplay').textContent = Math.abs(car.speed * 15).toFixed(0);
            document.getElementById('angleDisplay').textContent = Math.round((car.angle * 180 / Math.PI) % 360) + '°';
            document.getElementById('distanceDisplay').textContent = Math.round(car.totalDistance) + 'm';
            document.getElementById('posDisplay').textContent = Math.round(car.x) + ', ' + Math.round(car.y);

            drawMinimap();

            requestAnimationFrame(gameLoop);
        }

        camX = car.x - canvas.width / 2;
        camY = car.y - canvas.height / 2;
        gameLoop();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="auth.js"></script>
</body>
